version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"

    schedule:
      interval: "monthly"

    open-pull-requests-limit: 3

    groups:
      python-dev-tools:
        patterns:
          - "mypy"
          - "ruff"
          - "pytest"
          - "pytest-cov"
          - "pre-commit"
        update-types:
          - "minor"
          - "patch"
