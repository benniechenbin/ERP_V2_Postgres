# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: generate-env-example
        name: Generate .env.example
        entry: uv run python scripts/generate_env_example.py
        language: system
        pass_filenames: false
        files: ^(backend/config/settings\.py|scripts/generate_env_example\.py|\.env\.example)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2
        args:
          - --fix

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: debug-statements
      - id: check-ast
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict
        args: [--assume-in-merge]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.16.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi, jupyter, markdown]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy backend
        language: system
        pass_filenames: false
        always_run: true
